
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: #F1EFE8; }
.dash { display: grid; grid-template-columns: 260px 1fr; min-height: 440px; border-radius: var(--border-radius-lg); overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.sidebar { background: #173404; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }
.sidebar-title { font-size: 11px; font-weight: 500; color: #C0DD97; letter-spacing: 0.06em; text-transform: uppercase; }
.sidebar-station { font-size: 20px; font-weight: 500; color: #EAF3DE; line-height: 1.3; }
.sidebar-time { font-size: 12px; color: #639922; margin-top: 3px; }
.aqi-circle-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 0.25rem 0; }
.aqi-circle { width: 110px; height: 110px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid rgba(255,255,255,0.15); }
.aqi-circle-lv { font-size: 34px; font-weight: 500; color: #EAF3DE; }
.aqi-circle-sub { font-size: 11px; color: #9FE1CB; }
.aqi-circle-label { font-size: 15px; font-weight: 500; color: #EAF3DE; }
.aqi-circle-desc { font-size: 11px; color: #97C459; text-align: center; }
.sidebar-legend { margin-top: auto; }
.sidebar-legend-title { font-size: 10px; color: #639922; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 7px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 12px; color: #9FE1CB; }
.main { background: #F1EFE8; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.main-header { display: flex; justify-content: space-between; align-items: center; }
.main-header-label { font-size: 12px; color: #5F5E5A; }
.sensors { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.card { background: #fff; border-radius: 12px; padding: 0.85rem; border-left: 5px solid #ccc; position: relative; overflow: hidden; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-abbr { font-size: 15px; font-weight: 500; color: #2C2C2A; }
.card-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
.card-value { font-size: 28px; font-weight: 500; color: #2C2C2A; line-height: 1; }
.card-unit { font-size: 11px; color: #888780; margin-top: 2px; }
.bar-bg { height: 4px; background: #F1EFE8; border-radius: 2px; margin-top: 7px; }
.bar-fill { height: 4px; border-radius: 2px; }
.card-name { font-size: 10px; color: #888780; margin-top: 6px; }
.card-time { font-size: 10px; color: #B4B2A9; margin-top: 4px; border-top: 1px solid #F1EFE8; padding-top: 4px; }
.leaf-deco { position: absolute; bottom: -10px; right: -4px; opacity: 0.06; font-size: 52px; pointer-events: none; }
.status-row { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-text { font-size: 12px; color: #888780; }
.refresh-btn { font-size: 12px; padding: 4px 12px; border-radius: 8px; background: #EAF3DE; color: #27500A; border: 1px solid #97C459; cursor: pointer; }
.refresh-btn:hover { background: #C0DD97; }
.refresh-btn:disabled { opacity: 0.5; }
.footer { font-size: 11px; color: #B4B2A9; margin-top: auto; }
.loading-msg { font-size: 13px; color: #888780; padding: 2rem; text-align: center; grid-column: 1/-1; }
</style>

<div class="dash">
  <div class="sidebar">
    <div>
      <div class="sidebar-title">Qualità dell'aria</div>
      <div class="sidebar-station">Milano<br>v.Marche</div>
      <div class="sidebar-time" id="sb-time">—</div>
    </div>
    <div class="aqi-circle-wrap">
      <div class="aqi-circle" id="aqi-circle" style="background:rgba(255,255,255,0.08);">
        <div class="aqi-circle-lv" id="aqi-lv">—</div>
        <div class="aqi-circle-sub">/ 5</div>
      </div>
      <div class="aqi-circle-label" id="aqi-label">Caricamento</div>
      <div class="aqi-circle-desc">Indice AQI sintetico</div>
    </div>
    <div class="sidebar-legend">
      <div class="sidebar-legend-title">Scala livelli</div>
      <div class="legend-row"><div class="legend-dot" style="background:#1D9E75;"></div><div class="legend-label">1 — Buono</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:#F5C400;"></div><div class="legend-label">2 — Discreto</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:#F07800;"></div><div class="legend-label">3 — Mediocre</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:#E02020;"></div><div class="legend-label">4 — Scadente</div></div>
      <div class="legend-row"><div class="legend-dot" style="background:#7B1FA2;"></div><div class="legend-label">5 — Pessimo</div></div>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="main-header-label">Sensori attivi — ARPA Lombardia</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="status-row">
          <div class="status-dot" id="status-dot" style="background:#ccc;"></div>
          <div class="status-text" id="status-text">—</div>
        </div>
        <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">Aggiorna</button>
      </div>
    </div>
    <div class="sensors" id="sensors">
      <div class="loading-msg">Recupero dati in corso...</div>
    </div>
    <div class="footer">Fonte: dati.lombardia.it · Aggiornamento automatico ogni ora</div>
  </div>
</div>

<script>
const APP_TOKEN = new URLSearchParams(window.location.search).get("token") || "";
const BASE_URL  = "https://www.dati.lombardia.it/api/v3/views/ykhg-b8rs/query.json";

const SENSORI = [
  { id:"5504",  abbr:"NO\u2082",       nome:"Biossido di Azoto",     unita:"\u00b5g/m\u00b3", key:"NO2"  },
  { id:"5827",  abbr:"CO",             nome:"Monossido di Carbonio", unita:"mg/m\u00b3",       key:"CO"   },
  { id:"17127", abbr:"C\u2086H\u2086", nome:"Benzene",               unita:"\u00b5g/m\u00b3", key:"BNZ"  },
  { id:"20430", abbr:"PM10",           nome:"Particolato PM10",      unita:"\u00b5g/m\u00b3", key:"PM10" },
  { id:"20530", abbr:"PM2.5",          nome:"Particolato PM2.5",     unita:"\u00b5g/m\u00b3", key:"PM25" },
];

const SOGLIE = {
  NO2:  [[40,1],[100,2],[200,3],[400,4],[Infinity,5]],
  CO:   [[5,1],[7.5,2],[10,3],[20,4],[Infinity,5]],
  BNZ:  [[1.7,1],[3.4,2],[5,3],[10,4],[Infinity,5]],
  PM10: [[20,1],[40,2],[50,3],[100,4],[Infinity,5]],
  PM25: [[10,1],[20,2],[25,3],[50,4],[Infinity,5]],
};

// Palette ad alto contrasto: verde / giallo brillante / arancio / rosso / viola
const LIVELLI = {
  1: { label:"Buono",    color:"#1D9E75", light:"#E1F5EE", text:"#085041" },
  2: { label:"Discreto", color:"#F5C400", light:"#FFF8D6", text:"#6B5000" },
  3: { label:"Mediocre", color:"#F07800", light:"#FFF0DC", text:"#6B3200" },
  4: { label:"Scadente", color:"#E02020", light:"#FDEAEA", text:"#7A0000" },
  5: { label:"Pessimo",  color:"#7B1FA2", light:"#F5E6FB", text:"#3D0054" },
};

function getLv(key, v) {
  for (const [s,l] of SOGLIE[key]) if (v<=s) return l;
  return 5;
}
function getMax(key) {
  const s=SOGLIE[key]; return s[s.length-2][0];
}
function fmtData(iso) {
  if(!iso) return "—";
  return new Date(iso).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

async function fetchSensore(id) {
  const q=`SELECT \`idsensore\`,\`data\`,\`valore\` WHERE caseless_one_of(\`idsensore\`,"${id}") AND \`valore\` IS NOT NULL ORDER BY \`data\` DESC LIMIT 1`;
  const r=await fetch(BASE_URL+"?query="+encodeURIComponent(q),{headers:{"X-App-Token":APP_TOKEN}});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  const rows=Array.isArray(d)?d:(d.resultSet?.row||[]);
  if(!rows.length) return null;
  return {valore:parseFloat(rows[0].valore),data:rows[0].data};
}

let timer=null;

async function fetchAll() {
  document.getElementById("refresh-btn").disabled=true;
  document.getElementById("status-dot").style.background="#ccc";
  document.getElementById("status-text").textContent="Aggiornamento...";
  document.getElementById("sensors").innerHTML='<div class="loading-msg">Recupero dati...</div>';

  const results=await Promise.allSettled(SENSORI.map(s=>fetchSensore(s.id)));
  let lvMax=1, html="";

  results.forEach((res,i)=>{
    const s=SENSORI[i];
    if(res.status==="fulfilled"&&res.value){
      const {valore,data}=res.value;
      const lv=getLv(s.key,valore);
      if(lv>lvMax) lvMax=lv;
      const info=LIVELLI[lv];
      const pct=Math.min(100,Math.round(valore/getMax(s.key)*100));
      const vf=valore<10?valore.toFixed(2):Math.round(valore);
      html+=`<div class="card" style="border-left-color:${info.color};">
        <div class="card-top">
          <div class="card-abbr">${s.abbr}</div>
          <div class="card-badge" style="background:${info.light};color:${info.text};">${info.label}</div>
        </div>
        <div class="card-value">${vf}</div>
        <div class="card-unit">${s.unita}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${info.color};"></div></div>
        <div class="card-name">${s.nome}</div>
        <div class="card-time">${fmtData(data)}</div>
        <div class="leaf-deco">❧</div>
      </div>`;
    } else {
      html+=`<div class="card" style="border-left-color:#ccc;">
        <div class="card-abbr">${s.abbr}</div>
        <div class="card-value" style="font-size:16px;color:#888780;">N/D</div>
        <div class="card-name">${s.nome}</div>
      </div>`;
    }
  });

  document.getElementById("sensors").innerHTML=html;
  const info=LIVELLI[lvMax];
  document.getElementById("aqi-lv").textContent=lvMax;
  document.getElementById("aqi-label").textContent=info.label;
  document.getElementById("aqi-circle").style.borderColor=info.color+"88";
  document.getElementById("aqi-circle").style.background=info.color+"33";
  const now=new Date();
  document.getElementById("sb-time").textContent=now.toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
  document.getElementById("status-dot").style.background=info.color;
  document.getElementById("status-text").textContent="Aggiornato alle "+now.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
  document.getElementById("refresh-btn").disabled=false;
  if(timer) clearTimeout(timer);
  timer=setTimeout(fetchAll,60*60*1000);
}

fetchAll();
</script>
